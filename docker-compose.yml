services:
    vue:
        build: ./vue
        entrypoint: sh -c "test -x node_modules/.bin/vite || npm install --no-audit --no-fund --fetch-retries=5 --fetch-retry-maxtimeout=120000 || npm install --registry=https://registry.npmmirror.com --no-audit --no-fund --fetch-retries=5 --fetch-retry-maxtimeout=120000; npm run devhost"
        env_file:
            - path: ./vue/.env
              required: false
            - path: ./vue/.env.local
              required: false
        environment:
            VITE_API_BASE_URL: /api/v1
            VITE_BACKEND_PROXY_TARGET: http://api:8080
        ports:
            - "5173:5173"
        volumes:
            - ./vue/src:/vue/src
            - ./vue/package.json:/vue/package.json
            - ./vue/package-lock.json:/vue/package-lock.json
            - ./vue/vite.config.js:/vue/vite.config.js
            - vue_node_modules:/vue/node_modules
    api:
        build:
            context: .
            dockerfile: Dockerfile.dev
        ports:
            - "8080:8080"
        volumes:
            - .:/app
            - /app/build
            - /app/.gradle
        depends_on:
            - postgres
    postgres:
        image: postgres:16-alpine
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: mtg
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
    vue_node_modules:
